{% load wagtailcore_tags %}{% extends "base.html" %}
{% block title %}News{% endblock %}
{% block content %}
<div class="page-header fade-up"><h1>{{ page.title }}</h1></div>
<div class="grid-2 fade-up d1">
{% for post in posts %}
<a href="{% pageurl post %}" class="glass project-card">
  <span class="card-title">{{ post.title }}</span>
  <p style="font-family:var(--fm);font-size:11px;color:var(--text-muted)">{{ post.first_published_at|date:"N j, Y" }}</p>
</a>
{% empty %}
<div class="glass empty-state" style="grid-column:1/-1"><p>No posts yet.</p></div>
{% endfor %}
</div>
{% endblock %}
