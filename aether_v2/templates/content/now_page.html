{% load wagtailcore_tags %}{% extends "base.html" %}
{% block title %}Now{% endblock %}
{% block content %}
<div class="page-header fade-up">

</div>
<div class="glass fade-up d1" style="padding:36px;max-width:680px">
  <div style="color:var(--text-dim);line-height:1.9;font-size:15px">{{ page.body|richtext }}</div>
</div>
{% endblock %}
